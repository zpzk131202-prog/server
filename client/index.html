<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Client</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <h1>Game Client</h1>
        <p class="subtitle">회원가입과 로그인을 테스트할 수 있습니다.</p>

        <label for="username">아이디</label>
        <input id="username" type="text" placeholder="아이디 입력">

        <label for="password">비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호 입력">

        <div class="actions">
            <button id="signupBtn" type="button">회원가입</button>
            <button id="loginBtn" type="button">로그인</button>
        </div>

        <section class="result">
            <h2>결과</h2>
            <pre id="output">아직 요청이 없습니다.</pre>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
